services:
  - type: web
    name: airbnb-backend
    env: java
    region: oregon
    plan: free
    autoDeployTrigger: commit
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/AirBnb-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: airbnb-postgres
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: airbnb-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: airbnb-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: airbnb-postgres
    ipAllowList: []
    plan: free
    region: oregon
